<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./output.css" rel="stylesheet">

    <!-- <style>
        .item {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .item1 {
                color: yellow;
            }
        }
    </style> -->
</head>
<body>

    <!-- TailwindCSS mobile first, mobile er jonne age design chinta korte hobe -->
    <!-- Responsive : md: medium screen || lg: large screen-->
    <div class="bg-blue-400 md:bg-red-500 lg:bg-amber-500 p-4 w-36 h-36 md:w-48 md:h-48 lg:w-64 lg:h-64">
        <!-- or I can use mobile,tab(custom) instead of md,lg  -->
        <div class="item item1">Item 1</div>
        <div class="item item2">Item 2</div>
    </div>

<!-- For Grid Items with responsive -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4 mt-4">

    <!-- Row 1 -->
    <div class="bg-green-400 p-4 sm:col-span-1 lg:col-span-2">
        Grid Item 1
    </div>

    <div class="bg-amber-800 p-4 sm:col-span-1 lg:col-span-2">
        Grid Item 2
    </div>

    <div class="bg-red-400 p-4 sm:col-span-2 lg:col-span-2">
        Grid Item 3
    </div>

    <!-- Row 2 -->
    <div class="bg-lime-600 p-4 sm:col-span-2 lg:col-span-6">
        Grid Item 4
    </div>

    <!-- Row 3 -->
    <div class="bg-red-400 p-4 sm:col-span-1 lg:col-span-3">
        Grid Item 5
    </div>

    <div class="bg-red-800 p-4 sm:col-span-1 lg:col-span-3">
        Grid Item 6
    </div>

    <!-- Row 4 -->
    <div class="bg-blue-400 p-4 sm:col-span-1 lg:col-span-2">
        Grid Item 7
    </div>

    <div class="bg-yellow-400 p-4 sm:col-span-1 lg:col-span-4">
        Grid Item 8
    </div>

</div>

<!-- Responsive Image -->
<div class="mt-4">
    <img src=".\images\Zenitsu.jpg" alt="Zenitsu" class="w-36 h-auto md:w-1/2 lg:w-1/3">
    <!-- width ta diye dibo, but height ta auto rakhbo, jate image ta aspect ratio maintain kore -->
     <!-- <img src=".\images\Zenitsu.jpg" alt="Zenitsu" class="w-full h-64 object-cover"> -->
</div>

<!-- Responsive Form -->
  <div class="mt-10 px-4">

        <form class="max-w-md mx-auto space-y-4 bg-white p-6 rounded-lg shadow-md">

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium mb-1">
                    Email
                </label>

                <input 
                    type="email"
                    placeholder="Enter your email"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium mb-1">
                    Password
                </label>

                <input 
                    type="password"
                    placeholder="Enter your password"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <!-- Button -->
            <button 
                class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition"
            >
                Login
            </button>

        </form>

    </div>

<!-- 2 side form  -->
<!-- Gird use korle gap use korte hobe,space use kora jabe na -->
<div class="mt-10 px-4">

    <form class=" grid grid-cols-1 md:grid-cols-2 gap-4 max-w-3xl mx-auto">

        <!-- First Name -->
        <input
            type="text"
            placeholder="First Name"
            class="border border-gray-300 p-2 rounded-md"
        >

        <!-- Last Name -->
        <input
            type="text"
            placeholder="Last Name"
            class="border border-gray-300 p-2 rounded-md"
        >

        <!-- Email -->
        <input
            type="email"
            placeholder="Email"
            class="border border-gray-300 p-2 rounded-md md:col-span-2"
        >

    </form>

</div>

</body>
</html>
