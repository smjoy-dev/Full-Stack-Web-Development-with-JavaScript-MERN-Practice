<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded shadow-md text-center">
        <h1 class="text-2xl font-bold mb-4">Counter</h1>
        <p id="counter" class="text-4xl font-bold mb-4">0</p>
        <button id="increment" class="bg-blue-500 text-white px-4 py-2 rounded mr-2">Increment</button>
        <button id="decrement" class="bg-red-500 text-white px-4 py-2 rounded">Decrement</button>
    </div>

    <script src="main.js"></script>

</body>
</html>
