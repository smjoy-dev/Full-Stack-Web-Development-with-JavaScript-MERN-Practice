<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Popup</title>
    <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <button
        class="bg-blue-600 p-4 rounded-lg hover:bg-blue-500"
        onclick="openModal()">
        Open Modal
    </button>


    <div
        id="myModal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="relative bg-gray-800 p-6 rounded-2xl shadow-xl w-80">

            <!-- X - Icon  -->
            <button
                class="absolute top-2 right-3 text-2xl text-white hover:text-red-500"
                onclick="closeModal()">
                &times;
            </button>

            <h2 class="text-xl font-bold mb-4">
                Modal Title
            </h2>
            <p class="mb-4">
                This is a modal popup. Content here.
            </p>

            <!-- Close Button -->
            <button
                class="bg-red-500 p-3 rounded-lg hover:bg-red-400"
                onclick="closeModal()">
                Close Modal
            </button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
