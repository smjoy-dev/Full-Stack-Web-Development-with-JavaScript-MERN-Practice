<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Type 1 - Navigate margin -->
    <div class="box box1">Box1</div>
    <!--multiple class defined, class same but if called with 2nd one it will be changed-->
    <!-- box call dile 2tai kaj korbe , 2nd ta call dile 2nd ta kaj korbe,  -->
    <div class="box box2">Box1</div>


    <!-- Type 2 - Pseudo-Elements -->
    <br>
    <h1 class="title">Feature</h1>
    

    <!-- Type 3 - Pseudo-Class -->
    <section>
        <h2>hover</h2>
        <div class="hover">hover over me, I will change color</div>
    </section>
  
    <section>
        <h2>focus</h2>
        <input class="focus" type="text">
    </section>

    <section>
        <h2>:not()</h2>
        <ul class="not">
            <li>Item 1</li>
            <li>Item 2</li>
            <li class="none">Item 3 none </li>
            <li>Item 4</li>
        </ul>
    </section>

    <section>
        <h2>:last-of-type</h2>
        <div class="lasttype">
            <p>Paragraph 1</p>
            <p>Paragraph 2</p>
            <span>Span 1</span>
            <p>Paragraph 3</p>
            <span>Span 2</span>
        </div>
    </section>

    <section>
        <h2>:nth-child()</h2>
        <ul class="nth-child">
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
            <li>Item 4</li>
            <li>Item 5</li>
        </ul>
    </section>
</body>
</html>
