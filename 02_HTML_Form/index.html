<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Form</h1>
    <fieldset>
        <legend>Personal Information</legend>
    <form>
        <div>
            <label for="fullname">Full Name: </label>
            <input type="text" 
            id="fullname" 
            placeholder="Enter Your Name"
            required
        </div>

        <br>
        <br>
        
        <div>
            <label for="email">Email: </label>
            <input type="email" 
            id="email" 
            placeholder="Enter Your Email"
            required
        </div>

        <br>
        <br>

        <div>
            <label for="password">Password: </label>
            <input type="password" 
            id="password" 
            placeholder="Enter Your Password"
            required>
        </div>
        <br>
        </fieldset >

        <fieldset>
            <legend>Additional Information</legend>
        <div>
            <label for="male">Gender:</label>

                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            
<!-- name="gender" same থাকায় একটাই option select হবে 
id + for match করলে label এ click করলেও select হবে 
multiple choice properly দেখাবে  -->

        </div>

        <br>
        <div>
        <label for="country">Country</label> 
        <br>
        <select id="country" name="country">
            <option value="">Select Country</option>  
             <!-- etar value empty thakbe -->
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="canada">Canada</option>
            <option value="Bangladesh">Bangladesh</option>
        </select>
        </div>
        <br>
<!-- ekta item er jinish ekta div rakhar por br kaj kortese, 
nahole br kaj kortesilo na -->
        <div>
            <textarea id="message" name="message" rows="4" cols="30" placeholder="Enter Your Message"></textarea>
        </div>
<!-- 4 ta row ar 30 ta column er ekta textarea create korbe -->

       <div>
        <label for="terms">
            <input type="checkbox" name="terms" id="terms" required>
            I agree to the terms and conditions
        </label>
        </div>
       
        </fieldset>
        <br>
        <button type="submit" >Register</button>
        <button type="reset">Reset</button>
        
  </form>
</body>
</html>
