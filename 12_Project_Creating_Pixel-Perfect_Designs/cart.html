<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cart — Neth Bookpoint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700;1,400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap"
        rel="stylesheet">
    <style>body{font-family:'Poppins',sans-serif}</style>
</head>

<body class="min-h-screen flex flex-col bg-[#f3efe7] text-[#111827]">
        <header class="bg-[url('assets/images/nav.png')] bg-cover bg-center bg-no-repeat">
        <div class="max-w-7xl mx-auto py-3 ">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="assets/images/logo.png" alt="Logo">
                    <h1 class="bona-nova-bold font-bold text-2xl leading-tight tracking-wide text-[#CC9600]">
                        <span>NETH</span> <br>
                        <span>BOOKPOINT</span>
                    </h1>
                </div>
                <div>
                    <nav class="flex gap-10 flex-1 justify-self-end items-center">
                        <ul class="flex gap-6 flex-grow">
                            <li><a href="index.html" class="text-[#CC9600] font-bold text-lg">Home</a></li>
                            <li><a href="about.html" class="text-[#CC9600] font-bold text-lg">About</a></li>
                            <li><a href="shop.html" class="text-[#CC9600] font-bold text-lg">Shop</a></li>
                            <li><a href="cart.html" class="text-[#CC9600] font-bold text-lg">Cart</a></li>
                        </ul>
                        <li class="list-none">
                            <a href="">
                                <div class="flex flex-col gap-1 items-center">
                                    <img src="assets/images/user.png" alt="user" class="w-8">
                                    <span class="text-white">john@gmail.com</span>
                                </div>
                            </a>
                        </li>
                    </nav>
                </div>

            </div>
        </div>
    </header>

    <!-- Cart content -->
    <main class="max-w-7xl mx-auto px-4 py-10 flex-1">
        <h2 class="text-center text-xl font-semibold mb-8">Your Cart Details</h2>

        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-lg border border-black/10 p-6 shadow-sm">
                <div class="flex gap-4 items-start">
                    <img src="assets/images/book.png" alt="book" class="w-24 h-32 object-cover rounded-md">
                    <div class="flex-1">
                        <h3 class="font-semibold">Manikawatha</h3>
                        <p class="text-xs text-gray-600">Mahinda Perera M</p>
                        <div class="mt-3 font-medium">Rs. 700</div>

                        <div class="mt-4 flex items-center gap-2">
                            <label class="text-sm mr-2">Copies</label>
                            <div class="flex items-center border rounded-md overflow-hidden">
                                <button class="px-3 py-1 text-sm bg-white">-</button>
                                <div class="px-4 py-1 text-sm">1</div>
                                <button class="px-3 py-1 text-sm bg-white">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total and checkout under the item -->
            <div class="mt-6 text-center">
                <div class="text-sm mb-2">Total Price:</div>
                <div class="text-lg font-semibold mb-4">Rs. 700.00</div>
                <button class="px-4 py-2 rounded border border-black/20 bg-white hover:bg-gray-50">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <footer class="bg-[#050505] text-[#f2e4c2] py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">© 2026 Neth Bookpoint</div>
    </footer>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
</body>

</html>
